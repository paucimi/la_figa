services:
  - type: web
    name: la-figa
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn ui.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: LANGUAGE
        value: español
      - key: PYTHON_VERSION
        value: 3.12.0
